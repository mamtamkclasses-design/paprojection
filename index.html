<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Open World Car Game</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}

#ui {
  position: absolute;
  color: white;
  top: 10px;
  left: 10px;
  font-family: Arial;
}

canvas {
  display: block;
}
</style>
</head>

<body>

<div id="ui">
Speed: <span id="speed">0</span><br>
X: <span id="x">0</span> Y: <span id="y">0</span>
</div>

<canvas id="game"></canvas>

<script>
// ================= CANVAS =================
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ================= WORLD =================
const world = {
  width: 6000,
  height: 6000
};

// ================= CAMERA =================
let cam = { x: 0, y: 0 };

// ================= PLAYER CAR =================
let car = {
  x: 3000,
  y: 3000,
  angle: 0,
  speed: 0,
  maxSpeed: 8,
  accel: 0.2,
  friction: 0.05,
  turn: 0.04
};

// ================= INPUT =================
let keys = {};
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

// ================= TRAFFIC =================
let traffic = [];

function spawnTraffic() {
  for (let i = 0; i < 20; i++) {
    traffic.push({
      x: Math.random() * world.width,
      y: Math.random() * world.height,
      angle: Math.random() * Math.PI * 2,
      speed: 2 + Math.random() * 2
    });
  }
}
spawnTraffic();

// ================= PARTICLES =================
let particles = [];

// ================= UPDATE =================
function update() {

  // movement
  if (keys["ArrowUp"]) car.speed += car.accel;
  if (keys["ArrowDown"]) car.speed -= car.accel;

  car.speed *= 0.98;
  car.speed = Math.max(-car.maxSpeed, Math.min(car.maxSpeed, car.speed));

  if (keys["ArrowLeft"]) car.angle -= car.turn * car.speed;
  if (keys["ArrowRight"]) car.angle += car.turn * car.speed;

  car.x += Math.sin(car.angle) * car.speed;
  car.y -= Math.cos(car.angle) * car.speed;

  // boundaries
  car.x = Math.max(0, Math.min(world.width, car.x));
  car.y = Math.max(0, Math.min(world.height, car.y));

  // camera
  cam.x = car.x - canvas.width / 2;
  cam.y = car.y - canvas.height / 2;

  // traffic movement
  traffic.forEach(t => {
    t.x += Math.sin(t.angle) * t.speed;
    t.y -= Math.cos(t.angle) * t.speed;

    if (Math.random() < 0.02) t.angle += (Math.random() - 0.5);

    // collision
    let dx = car.x - t.x;
    let dy = car.y - t.y;
    let dist = Math.sqrt(dx*dx + dy*dy);

    if (dist < 50) {
      car.speed *= -0.5;

      // particles
      for (let i=0;i<10;i++){
        particles.push({
          x: car.x,
          y: car.y,
          vx: (Math.random()-0.5)*5,
          vy: (Math.random()-0.5)*5,
          life: 1
        });
      }
    }
  });

  // particles
  particles.forEach((p,i)=>{
    p.x += p.vx;
    p.y += p.vy;
    p.life -= 0.02;
    if (p.life <= 0) particles.splice(i,1);
  });

  // UI
  document.getElementById("speed").innerText = car.speed.toFixed(2);
  document.getElementById("x").innerText = Math.floor(car.x);
  document.getElementById("y").innerText = Math.floor(car.y);
}

// ================= DRAW CITY =================
function drawCity() {

  // background
  ctx.fillStyle = "#2c3e50";
  ctx.fillRect(-cam.x, -cam.y, world.width, world.height);

  // roads grid
  ctx.strokeStyle = "#555";
  ctx.lineWidth = 20;

  for (let i=0;i<world.width;i+=300){
    ctx.beginPath();
    ctx.moveTo(i-cam.x, -cam.y);
    ctx.lineTo(i-cam.x, world.height-cam.y);
    ctx.stroke();
  }

  for (let j=0;j<world.height;j+=300){
    ctx.beginPath();
    ctx.moveTo(-cam.x, j-cam.y);
    ctx.lineTo(world.width-cam.x, j-cam.y);
    ctx.stroke();
  }

  // buildings
  for (let i=0;i<200;i++){
    let x=(i*137)%world.width;
    let y=(i*311)%world.height;

    ctx.fillStyle="#34495e";
    ctx.fillRect(x-cam.x,y-cam.y,80,80);
  }
}

// ================= DRAW CAR =================
function drawCar(x,y,angle,color) {
  ctx.save();
  ctx.translate(x-cam.x,y-cam.y);
  ctx.rotate(angle);

  ctx.fillStyle=color;
  ctx.fillRect(-15,-30,30,60);

  ctx.fillStyle="black";
  ctx.fillRect(-10,-25,20,15);

  ctx.restore();
}

// ================= DRAW =================
function draw() {

  drawCity();

  // traffic
  traffic.forEach(t=>{
    drawCar(t.x,t.y,t.angle,"red");
  });

  // player
  drawCar(car.x,car.y,car.angle,"cyan");

  // particles
  particles.forEach(p=>{
    ctx.fillStyle="orange";
    ctx.fillRect(p.x-cam.x,p.y-cam.y,3,3);
  });

  // night overlay
  let night = (Math.sin(Date.now()*0.0002)+1)/2;
  ctx.fillStyle = "rgba(0,0,50,"+night*0.5+")";
  ctx.fillRect(0,0,canvas.width,canvas.height);
}

// ================= LOOP =================
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();

</script>

</body>
</html>

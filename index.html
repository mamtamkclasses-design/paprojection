<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Furfuri Nagar Runner</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{overflow:hidden;font-family:sans-serif;background:#000;}
canvas{display:block;}
#score{position:absolute;top:10px;left:15px;color:#fff;font-size:22px;font-weight:bold;}
#gameOver{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#ff4444;font-size:32px;display:none;text-align:center;}
</style>
</head>
<body>

<div id="score">Score: 0</div>
<div id="gameOver">GAME OVER<br>Press R</div>
<canvas id="c"></canvas>

<script>
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

const lanes=[canvas.width*0.3,canvas.width*0.5,canvas.width*0.7];
let lane=1;

let player={
x:lanes[lane],
y:canvas.height-140,
w:60,
h:90,
vy:0,
jump:false
};

let obs=[];
let speed=7;
let score=0;
let over=false;

// parallax background layers
let bg1=0;
let bg2=0;
let bg3=0;

document.addEventListener("keydown",e=>{
if(!over){
if(e.key==="ArrowLeft") lane=Math.max(0,lane-1);
if(e.key==="ArrowRight") lane=Math.min(2,lane+1);
if(e.key===" " && !player.jump){player.vy=-18;player.jump=true;}
}else{
if(e.key.toLowerCase()==="r") reset();
}
});

function drawSky(){
let g=ctx.createLinearGradient(0,0,0,canvas.height);
g.addColorStop(0,"#4facfe");
g.addColorStop(1,"#00f2fe");
ctx.fillStyle=g;
ctx.fillRect(0,0,canvas.width,canvas.height);
}

function drawMountains(){
ctx.fillStyle="#2e8b57";
for(let i=-200;i<canvas.width+200;i+=200){
ctx.beginPath();
ctx.moveTo(i+bg3,canvas.height-120);
ctx.lineTo(i+100+bg3,canvas.height-350);
ctx.lineTo(i+200+bg3,canvas.height-120);
ctx.fill();
}
}

function drawVillage(){
ctx.fillStyle="#c68642";
for(let i=-150;i<canvas.width+150;i+=150){
ctx.fillRect(i+bg2,canvas.height-180,80,60);
ctx.fillStyle="#8b4513";
ctx.beginPath();
ctx.moveTo(i+bg2,canvas.height-180);
ctx.lineTo(i+40+bg2,canvas.height-230);
ctx.lineTo(i+80+bg2,canvas.height-180);
ctx.fill();
ctx.fillStyle="#c68642";
}
}

function drawRoad(){
ctx.fillStyle="#333";
ctx.fillRect(0,canvas.height-100,canvas.width,100);
ctx.strokeStyle="#fff";
ctx.setLineDash([20,15]);
ctx.lineWidth=3;
lanes.forEach(l=>{
ctx.beginPath();
ctx.moveTo(l,canvas.height);
ctx.lineTo(l,canvas.height-100);
ctx.stroke();
});
ctx.setLineDash([]);
}

function drawShinchan(){
let x=player.x-30;
let y=player.y;

// body
ctx.fillStyle="#ff0000";
ctx.fillRect(x,y,60,50);

// shorts
ctx.fillStyle="#ffff00";
ctx.fillRect(x,y+50,60,40);

// head
ctx.fillStyle="#f5cba7";
ctx.beginPath();
ctx.arc(x+30,y-10,25,0,Math.PI*2);
ctx.fill();

// eyes
ctx.fillStyle="#000";
ctx.fillRect(x+15,y-15,8,5);
ctx.fillRect(x+37,y-15,8,5);

// mouth
ctx.beginPath();
ctx.arc(x+30,y,10,0,Math.PI);
ctx.stroke();
}

function drawKirmada(o){
let x=o.x-30;
let y=o.y;

// body
ctx.fillStyle="#8b0000";
ctx.fillRect(x,y,60,80);

// horns
ctx.fillStyle="#000";
ctx.beginPath();
ctx.moveTo(x+10,y);
ctx.lineTo(x+20,y-20);
ctx.lineTo(x+30,y);
ctx.fill();

ctx.beginPath();
ctx.moveTo(x+50,y);
ctx.lineTo(x+40,y-20);
ctx.lineTo(x+30,y);
ctx.fill();

// eyes
ctx.fillStyle="#fff";
ctx.fillRect(x+15,y+20,8,8);
ctx.fillRect(x+37,y+20,8,8);
}

function spawn(){
let l=lanes[Math.floor(Math.random()*3)];
obs.push({x:l,y:-120,w:60,h:80});
}

function update(){
if(over) return;

player.x=lanes[lane];
player.y+=player.vy;
player.vy+=1;

if(player.y>=canvas.height-140){
player.y=canvas.height-140;
player.jump=false;
}

obs.forEach((o,i)=>{
o.y+=speed;

if(o.y>canvas.height){
obs.splice(i,1);
score++;
}

if(
player.x-30<o.x+30 &&
player.x+30>o.x-30 &&
player.y<o.y+80 &&
player.y+90>o.y
){
end();
}
});

if(score%10===0 && score!==0){
speed+=0.02;
}

// parallax movement
bg1-=speed*0.2;
bg2-=speed*0.4;
bg3-=speed*0.6;

if(bg1<-canvas.width) bg1=0;
if(bg2<-canvas.width) bg2=0;
if(bg3<-canvas.width) bg3=0;
}

function draw(){
drawSky();
drawMountains();
drawVillage();
drawRoad();

drawShinchan();

obs.forEach(o=>drawKirmada(o));

document.getElementById("score").innerText="Score: "+score;
}

function loop(){
update();
draw();
requestAnimationFrame(loop);
}

setInterval(()=>{
if(!over) spawn();
},800);

function end(){
over=true;
document.getElementById("gameOver").style.display="block";
}

function reset(){
obs=[];
score=0;
speed=7;
lane=1;
player.y=canvas.height-140;
player.vy=0;
over=false;
document.getElementById("gameOver").style.display="none";
}

loop();
</script>

</body>
</html>

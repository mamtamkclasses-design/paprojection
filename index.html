<!DOCTYPE html>
<html>
<head>
<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}

/* Canvas glow animation */
canvas {
  display: block;
  animation: glow 3s infinite alternate;
}

@keyframes glow {
  from { filter: brightness(1); }
  to { filter: brightness(1.2) contrast(1.1); }
}

/* MiniMap styling */
#minimap {
  position: absolute;
  top: 10px;
  right: 10px;
  border: 2px solid white;
  background: rgba(0,0,0,0.6);
}
</style>
</head>

<body>
<canvas id="game"></canvas>
<canvas id="minimap" width="150" height="150"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const minimap = document.getElementById("minimap");
const mctx = minimap.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ================= WORLD =================
const world = { w: 3000, h: 3000 };

// ================= PLAYER =================
let car = {
  x: 500,
  y: 500,
  angle: 0,
  speed: 0,
  maxSpeed: 8,
  accel: 0.3,
  friction: 0.95,
  turnSpeed: 0.05,
  driftFactor: 0.92,
  vx: 0,
  vy: 0
};

// ================= INPUT =================
let keys = {};
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

// ================= PARTICLES =================
let particles = [];

// ================= CAMERA =================
let cam = { x: 0, y: 0 };

// ================= DRAW CAR =================
function drawCar(x, y, angle, color){
  ctx.save();
  ctx.translate(x - cam.x, y - cam.y);
  ctx.rotate(angle);

  ctx.fillStyle = color;
  ctx.fillRect(-10, -5, 20, 10);

  ctx.restore();
}

// ================= UPDATE =================
function update(){

  // acceleration
  if(keys["ArrowUp"]) car.speed += car.accel;
  if(keys["ArrowDown"]) car.speed -= car.accel;

  // clamp speed
  car.speed = Math.max(-car.maxSpeed/2, Math.min(car.maxSpeed, car.speed));

  // turning (more effective when moving)
  if(keys["ArrowLeft"]) car.angle -= car.turnSpeed * (car.speed/4);
  if(keys["ArrowRight"]) car.angle += car.turnSpeed * (car.speed/4);

  // velocity vector
  car.vx += Math.cos(car.angle) * car.speed * 0.1;
  car.vy += Math.sin(car.angle) * car.speed * 0.1;

  // drifting effect
  car.vx *= car.driftFactor;
  car.vy *= car.driftFactor;

  car.x += car.vx;
  car.y += car.vy;

  // friction
  car.speed *= car.friction;

  // particles (drift smoke)
  if(Math.abs(car.speed) > 2){
    particles.push({
      x: car.x,
      y: car.y,
      life: 30,
      vx: (Math.random()-0.5)*2,
      vy: (Math.random()-0.5)*2
    });
  }

  particles.forEach(p=>{
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
  });

  particles = particles.filter(p => p.life > 0);

  // camera follows
  cam.x = car.x - canvas.width/2;
  cam.y = car.y - canvas.height/2;
}

// ================= DRAW =================
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // road grid
  ctx.strokeStyle = "#222";
  for(let i=0;i<world.w;i+=100){
    ctx.beginPath();
    ctx.moveTo(i-cam.x,0-cam.y);
    ctx.lineTo(i-cam.x,world.h-cam.y);
    ctx.stroke();
  }

  for(let i=0;i<world.h;i+=100){
    ctx.beginPath();
    ctx.moveTo(0-cam.x,i-cam.y);
    ctx.lineTo(world.w-cam.x,i-cam.y);
    ctx.stroke();
  }

  drawCar(car.x,car.y,car.angle,"cyan");

  // particles
  particles.forEach(p=>{
    ctx.fillStyle = "orange";
    ctx.fillRect(p.x-cam.x,p.y-cam.y,3,3);
  });

  // night overlay animation
  let n = (Math.sin(Date.now()*0.0005)+1)/2;
  ctx.fillStyle = "rgba(0,0,50,"+n*0.5+")";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  drawMiniMap();
}

// ================= MINIMAP =================
function drawMiniMap(){
  mctx.clearRect(0,0,150,150);

  let scale = 150/world.w;

  // player
  mctx.fillStyle = "cyan";
  mctx.fillRect(car.x*scale,car.y*scale,5,5);

  // border animation glow
  mctx.strokeStyle = "white";
  mctx.strokeRect(0,0,150,150);
}

// ================= LOOP =================
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>

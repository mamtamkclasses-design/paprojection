<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Furfuri Nagar Runner Ultra HD</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{overflow:hidden;background:#000;font-family:sans-serif;}
canvas{display:block;}
#score{position:absolute;top:10px;left:15px;color:#fff;font-size:22px;font-weight:bold;}
#gameOver{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#ff4444;font-size:32px;display:none;text-align:center;}
</style>

</head>
<body>

<div id="score">Score: 0</div>
<div id="gameOver">GAME OVER<br>Press R</div>
<canvas id="c"></canvas>

<script>
// ================= BASIC =================
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

// ================= LANES =================
const lanes=[canvas.width*0.3,canvas.width*0.5,canvas.width*0.7];
let lane=1;

// ================= PLAYER =================
let player={
x:lanes[lane],
y:canvas.height-160,
vy:0,
jump:false,
frame:0
};

// ================= GAME =================
let obstacles=[];
let coins=[];
let particles=[];
let speed=8;
let score=0;
let gameOver=false;

// ================= BACKGROUND OFFSETS =================
let cloudX=0;
let mountainX=0;
let villageX=0;
let treeX=0;

// ================= INPUT =================
document.addEventListener("keydown",e=>{
if(!gameOver){
if(e.key==="ArrowLeft") lane=Math.max(0,lane-1);
if(e.key==="ArrowRight") lane=Math.min(2,lane+1);
if(e.key===" " && !player.jump){
player.vy=-20;
player.jump=true;
}
}else{
if(e.key.toLowerCase()==="r") reset();
}
});

// ================= SKY =================
function drawSky(){
let g=ctx.createLinearGradient(0,0,0,canvas.height);
g.addColorStop(0,"#1e3c72");
g.addColorStop(1,"#2a5298");
ctx.fillStyle=g;
ctx.fillRect(0,0,canvas.width,canvas.height);

// sun glow
let grad=ctx.createRadialGradient(canvas.width-120,120,20,canvas.width-120,120,120);
grad.addColorStop(0,"rgba(255,255,150,1)");
grad.addColorStop(1,"rgba(255,255,150,0)");
ctx.fillStyle=grad;
ctx.beginPath();
ctx.arc(canvas.width-120,120,120,0,Math.PI*2);
ctx.fill();
}

// ================= CLOUDS =================
function drawClouds(){
ctx.fillStyle="rgba(255,255,255,0.9)";
for(let i=0;i<6;i++){
let x=(i*250+cloudX)%(canvas.width+300);
let y=80+i*20;

ctx.beginPath();
ctx.arc(x,y,25,0,Math.PI*2);
ctx.arc(x+30,y,30,0,Math.PI*2);
ctx.arc(x+60,y,25,0,Math.PI*2);
ctx.fill();
}
}

// ================= MOUNTAINS =================
function drawMountains(){
for(let i=-200;i<canvas.width+200;i+=200){
let x=i+mountainX;

let g=ctx.createLinearGradient(0,canvas.height-350,0,canvas.height);
g.addColorStop(0,"#355c7d");
g.addColorStop(1,"#1c1c1c");

ctx.fillStyle=g;
ctx.beginPath();
ctx.moveTo(x,canvas.height-120);
ctx.lineTo(x+100,canvas.height-350);
ctx.lineTo(x+200,canvas.height-120);
ctx.fill();
}
}

// ================= TREES =================
function drawTrees(){
for(let i=-100;i<canvas.width+100;i+=120){
let x=i+treeX;

// trunk
ctx.fillStyle="#5c4033";
ctx.fillRect(x,canvas.height-150,10,40);

// leaves
ctx.fillStyle="#228b22";
ctx.beginPath();
ctx.arc(x+5,canvas.height-160,25,0,Math.PI*2);
ctx.fill();
}
}

// ================= VILLAGE =================
function drawVillage(){
for(let i=-200;i<canvas.width+200;i+=180){
let x=i+villageX;

// house body
ctx.fillStyle="#d2b48c";
ctx.fillRect(x,canvas.height-180,100,70);

// roof
ctx.fillStyle="#8b0000";
ctx.beginPath();
ctx.moveTo(x,canvas.height-180);
ctx.lineTo(x+50,canvas.height-240);
ctx.lineTo(x+100,canvas.height-180);
ctx.fill();

// shadow
ctx.fillStyle="rgba(0,0,0,0.2)";
ctx.fillRect(x,canvas.height-180,100,70);
}
}

// ================= ROAD =================
function drawRoad(){
ctx.fillStyle="#222";
ctx.fillRect(0,canvas.height-120,canvas.width,120);

// road shine
let g=ctx.createLinearGradient(0,canvas.height-120,0,canvas.height);
g.addColorStop(0,"rgba(255,255,255,0.1)");
g.addColorStop(1,"rgba(0,0,0,0.6)");
ctx.fillStyle=g;
ctx.fillRect(0,canvas.height-120,canvas.width,120);

// lane lines
ctx.strokeStyle="#fff";
ctx.setLineDash([30,20]);
ctx.lineWidth=4;
lanes.forEach(l=>{
ctx.beginPath();
ctx.moveTo(l,canvas.height);
ctx.lineTo(l,canvas.height-120);
ctx.stroke();
});
ctx.setLineDash([]);
}

// ================= SHINCHAN =================
function drawShinchan(){
let x=player.x;
let y=player.y;
let bounce=Math.sin(player.frame*0.4)*4;

// shadow
ctx.fillStyle="rgba(0,0,0,0.3)";
ctx.beginPath();
ctx.ellipse(x,canvas.height-120,30,10,0,0,Math.PI*2);
ctx.fill();

// body
ctx.fillStyle="#ff0000";
ctx.fillRect(x-30,y+bounce,60,50);

// shorts
ctx.fillStyle="#ffff00";
ctx.fillRect(x-30,y+50+bounce,60,40);

// head
ctx.fillStyle="#f5cba7";
ctx.beginPath();
ctx.arc(x,y-10+bounce,28,0,Math.PI*2);
ctx.fill();

// eyes
ctx.fillStyle="#000";
ctx.fillRect(x-15,y-15+bounce,10,5);
ctx.fillRect(x+5,y-15+bounce,10,5);

// mouth
ctx.beginPath();
ctx.arc(x,y+5+bounce,12,0,Math.PI);
ctx.stroke();

// hair
ctx.fillStyle="#000";
ctx.fillRect(x-20,y-30+bounce,40,10);

player.frame++;
}

// ================= KIRMADA =================
function drawKirmada(o){
let x=o.x;
let y=o.y;

// glow
let g=ctx.createRadialGradient(x,y,10,x,y,60);
g.addColorStop(0,"rgba(255,0,0,0.8)");
g.addColorStop(1,"rgba(0,0,0,0)");
ctx.fillStyle=g;
ctx.beginPath();
ctx.arc(x,y,60,0,Math.PI*2);
ctx.fill();

// body
ctx.fillStyle="#8b0000";
ctx.fillRect(x-30,y,60,80);

// horns
ctx.fillStyle="#000";
ctx.beginPath();
ctx.moveTo(x-20,y);
ctx.lineTo(x-10,y-25);
ctx.lineTo(x,y);
ctx.fill();

ctx.beginPath();
ctx.moveTo(x+20,y);
ctx.lineTo(x+10,y-25);
ctx.lineTo(x,y);
ctx.fill();

// eyes glow
ctx.fillStyle="yellow";
ctx.fillRect(x-10,y+20,8,8);
ctx.fillRect(x+2,y+20,8,8);
}

// ================= COINS =================
function drawCoins(){
coins.forEach(c=>{
let g=ctx.createRadialGradient(c.x,c.y,2,c.x,c.y,10);
g.addColorStop(0,"#fff");
g.addColorStop(1,"gold");
ctx.fillStyle=g;

ctx.beginPath();
ctx.arc(c.x,c.y,10,0,Math.PI*2);
ctx.fill();
});
}

// ================= PARTICLES =================
function drawParticles(){
particles.forEach((p,i)=>{
ctx.fillStyle="rgba(255,255,255,"+p.life+")";
ctx.fillRect(p.x,p.y,3,3);
p.y+=p.vy;
p.life-=0.02;
if(p.life<=0) particles.splice(i,1);
});
}

// ================= SPAWN =================
function spawnObstacle(){
let l=lanes[Math.floor(Math.random()*3)];
obstacles.push({x:l,y:-120});
}

function spawnCoin(){
let l=lanes[Math.floor(Math.random()*3)];
coins.push({x:l,y:-120});
}

// ================= UPDATE =================
function update(){
if(gameOver) return;

player.x=lanes[lane];

// gravity
player.y+=player.vy;
player.vy+=1;

if(player.y>=canvas.height-160){
player.y=canvas.height-160;
player.jump=false;
}

// obstacles
obstacles.forEach((o,i)=>{
o.y+=speed;

if(o.y>canvas.height){
obstacles.splice(i,1);
score++;
}

// collision
if(
player.x-30<o.x+30 &&
player.x+30>o.x-30 &&
player.y<o.y+80 &&
player.y+100>o.y
){
end();
}
});

// coins
coins.forEach((c,i)=>{
c.y+=speed;

if(
player.x-30<c.x+10 &&
player.x+30>c.x-10 &&
player.y<c.y+10 &&
player.y+100>c.y
){
coins.splice(i,1);
score+=5;
}
});

// particles
particles.push({
x:player.x,
y:player.y+80,
vy:Math.random()*2,
life:1
});

// difficulty
if(score%10===0 && score!==0) speed+=0.02;

// parallax
cloudX-=1;
mountainX-=speed*0.3;
villageX-=speed*0.5;
treeX-=speed*0.8;
}

// ================= DRAW =================
function draw(){
drawSky();
drawClouds();
drawMountains();
drawVillage();
drawTrees();
drawRoad();

drawShinchan();
obstacles.forEach(drawKirmada);
drawCoins();
drawParticles();

document.getElementById("score").innerText="Score: "+score;
}

// ================= LOOP =================
function loop(){
update();
draw();
requestAnimationFrame(loop);
}

// ================= TIMERS =================
setInterval(()=>{if(!gameOver) spawnObstacle();},700);
setInterval(()=>{if(!gameOver) spawnCoin();},1100);

// ================= END =================
function end(){
gameOver=true;
document.getElementById("gameOver").style.display="block";
}

// ================= RESET =================
function reset(){
obstacles=[];
coins=[];
particles=[];
score=0;
speed=8;
lane=1;
player.y=canvas.height-160;
player.vy=0;
gameOver=false;
document.getElementById("gameOver").style.display="none";
}

// ================= START =================
loop();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next-Gen JEE/NEET 3D ChemSim</title>
    <style>
        :root {
            --bg-dark: #090d16;
            --panel-bg: #131c2e;
            --accent-blue: #00d2ff;
            --neon-green: #39ff14;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: #e2e8f0;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { margin: 0; font-size: 28px; letter-spacing: 1px; background: linear-gradient(45deg, #00d2ff, #00ff87); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p.tagline { margin: 5px 0 25px 0; color: #64748b; font-size: 14px; }

        .app-layout {
            display: grid;
            grid-template-columns: 280px 1fr 340px;
            gap: 20px;
            width: 100%;
            max-width: 1300px;
            height: 650px;
        }

        .glass-panel {
            background: var(--panel-bg);
            border: 1px solid #233554;
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
        }

        .scroll-list { overflow-y: auto; flex-grow: 1; margin-bottom: 15px; padding-right: 5px; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #233554; border-radius: 4px; }

        .chem-node {
            background: #1e293b;
            border: 1px solid #334155;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .chem-node:hover { border-color: var(--accent-blue); background: #24334d; }
        .chem-node.active-r1 { border-color: #ff007f; box-shadow: 0 0 10px rgba(255,0,127,0.3); }
        .chem-node.active-r2 { border-color: #00ff87; box-shadow: 0 0 10px rgba(0,255,135,0.3); }

        /* The Laboratory Table */
        .lab-table {
            background: radial-gradient(circle at center, #1a263e 0%, #090d16 100%);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .bench-display {
            flex-grow: 1;
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            padding-bottom: 60px;
            position: relative;
        }

        /* 3D Glassware Rendering styling via CSS */
        .beaker-wrapper { text-align: center; position: relative; }
        .beaker-label { font-size: 12px; font-weight: bold; color: #94a3b8; margin-top: 10px; text-transform: uppercase;}
        
        canvas {
            background: transparent;
            filter: drop-shadow(0px 10px 15px rgba(0,0,0,0.7));
            transition: transform 0.5s ease;
        }

        .pouring-left { transform: translate(120px, -100px) rotate(60deg); }
        .pouring-right { transform: translate(-120px, -100px) rotate(-60deg); }

        .action-deck { display: flex; gap: 15px; }
        .btn-prime {
            flex: 1; padding: 15px; border: none; border-radius: 8px;
            font-weight: bold; font-size: 15px; cursor: pointer; letter-spacing: 0.5px;
            transition: all 0.3s;
        }
        #pour-btn { background: linear-gradient(135deg, #00bcff 0%, #0066ff 100%); color: white; box-shadow: 0 4px 15px rgba(0,102,255,0.4); }
        #clear-btn { background: #334155; color: #cbd5e1; }
        #pour-btn:disabled { background: #1e293b; color: #64748b; cursor: not-allowed; box-shadow: none;}

        /* Right Concept Dashboard */
        .concept-title { color: var(--accent-blue); margin: 0 0 10px 0; font-size: 18px; }
        .data-card { background: #0b111e; border: 1px solid #1e293b; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        .formula { font-family: 'Consolas', monospace; color: var(--neon-green); font-size: 15px; }
    </style>
</head>
<body>

    <h1>NEET/JEE Next-Gen Chemistry Simulator</h1>
    <p class="tagline">Photorealistic Physics-Engine Prototype for Qualitative Analysis</p>

    <div class="app-layout">
        <!-- Reactants Input Panel -->
        <div class="glass-panel">
            <h3 style="margin-top:0; border-bottom: 1px solid #233554; padding-bottom:10px;">Reagent Store</h3>
            
            <label style="font-size:11px; color:#64748b; font-weight:bold; letter-spacing:1px;">BEAKER A (REAGENT)</label>
            <div class="scroll-list" id="list-a"></div>

            <label style="font-size:11px; color:#64748b; font-weight:bold; letter-spacing:1px;">BEAKER B (SALT SOLUTION)</label>
            <div class="scroll-list" id="list-b"></div>
        </div>

        <!-- Dynamic Studio Workbench -->
        <div class="glass-panel lab-table">
            <div class="bench-display">
                <div class="beaker-wrapper">
                    <canvas id="canvasA" width="120" height="150"></canvas>
                    <div class="beaker-label" id="lbl-a">Beaker A</div>
                </div>
                <div class="beaker-wrapper">
                    <canvas id="canvasMain" width="160" height="200"></canvas>
                    <div class="beaker-label" style="color:var(--accent-blue);">Reaction Beaker</div>
                </div>
                <div class="beaker-wrapper">
                    <canvas id="canvasB" width="120" height="150"></canvas>
                    <div class="beaker-label" id="lbl-b">Beaker B</div>
                </div>
            </div>
            
            <div class="action-deck">
                <button class="btn-prime" id="pour-btn" disabled onclick="executeSimulation()">Pour & Synthesize</button>
                <button class="btn-prime" id="clear-btn" onclick="resetStudio()">Reset Bench</button>
            </div>
        </div>

        <!-- Advanced Conceptual Explainer -->
        <div class="glass-panel">
            <h3 style="margin-top:0; border-bottom: 1px solid #233554; padding-bottom:10px;">Molecular Diagnostics</h3>
            <div class="scroll-list" id="diagnostics-panel" style="margin:0;">
                <div style="color: #64748b; text-align:center; margin-top:40px;">Select reactants from the left rack and trigger the synthesis to calculate properties.</div>
            </div>
        </div>
    </div>

    <script>
        // High-fidelity setup definitions for 10 core compounds mapped out with chemical signatures
        const chemicalsA = {
            "NaOH": { color: "rgba(220, 235, 255, 0.4)", secondary: "rgba(255,255,255,0.1)", type: "liquid" },
            "NH4OH": { color: "rgba(240, 240, 250, 0.4)", secondary: "rgba(255,255,255,0.1)", type: "liquid" },
            "H2SO4": { color: "rgba(225, 225, 235, 0.6)", secondary: "rgba(200,200,220,0.2)", type: "liquid" },
            "AgNO3": { color: "rgba(255, 255, 255, 0.3)", secondary: "rgba(240,245,255,0.1)", type: "liquid" }
        };

        const chemicalsB = {
            "FeSO4": { name: "Ferrous Sulfate", color: "rgba(143, 188, 143, 0.7)", type: "liquid" },
            "FeCl3": { name: "Ferric Chloride", color: "rgba(204, 119, 34, 0.8)", type: "liquid" },
            "CuSO4": { name: "Copper Sulfate", color: "rgba(30, 144, 255, 0.7)", type: "liquid" },
            "ZnSO4": { name: "Zinc Sulfate", color: "rgba(255, 255, 255, 0.2)", type: "liquid" },
            "KI": { name: "Potassium Iodide", color: "rgba(255, 255, 255, 0.2)", type: "liquid" },
            "Na2CO3": { name: "Sodium Carbonate", color: "rgba(254, 254, 254, 0.3)", type: "liquid" }
        };

        const reactionEngine = [
            { a: "NaOH", b: "FeSO4", targetColor: "rgba(46, 125, 50, 0.85)", state: "ppt", pptColor: "#1b4d22", gas: false, obs: "Dirty green precipitate of Fe(OH)₂ settles instantly at the base.", eq: "FeSO₄ + 2NaOH → Fe(OH)₂↓ + Na₂SO₄", notes: "Crucial Group 3 identification checkpoint. Fe(OH)₂ undergoes quick atmospheric oxidation over time to switch into a red-brown Fe(OH)₃ state." },
            { a: "NaOH", b: "FeCl3", targetColor: "rgba(139, 69, 19, 0.9)", state: "ppt", pptColor: "#5c2d16", gas: false, obs: "Heavy reddish-brown gelatinous precipitate localized at the base.", eq: "FeCl₃ + 3NaOH → Fe(OH)₃↓ + 3NaCl", notes: "Confirms presence of Fe³⁺. This distinct precipitate remains completely insoluble even when excess sodium hydroxide is introduced." },
            { a: "NH4OH", b: "CuSO4", targetColor: "rgba(0, 0, 139, 0.9)", state: "solution", gas: false, obs: "Intense, glowing Deep Blue Solution completely fills the vessel.", eq: "Cu²⁺ + 4NH₃ → [Cu(NH₃)₄]²⁺ (Tetrammineaquacopper II)", notes: "High frequency JEE core question. The mesmerizing deep sapphire blue coloration stems directly from d-d coordination transitions inside the complex ion." },
            { a: "NaOH", b: "ZnSO4", targetColor: "rgba(240, 240, 240, 0.3)", state: "clear_amphoteric", gas: false, obs: "A transient white gelatinous ppt forms and dissolves smoothly back into a completely clear solution.", eq: "Zn²⁺ + 2OH⁻ → Zn(OH)₂↓ → [Zn(OH)₄]²⁻", notes: "Highlights the distinct amphoteric fingerprint of Zinc ions, dissolving perfectly inside excess alkaline environments." },
            { a: "H2SO4", b: "Na2CO3", targetColor: "rgba(230, 240, 255, 0.4)", state: "solution", gas: true, bubbleColor: "rgba(255,255,255,0.7)", obs: "Violent brisk effervescence; massive discharge of rapid gas bubbles.", eq: "Na₂CO₃ + H₂SO₄ → Na₂SO₄ + H₂O + CO₂↑", notes: "Classic testing signature for Carbonate (CO₃²⁻) anions. Evolved Carbon Dioxide turns Lime water milky." },
            { a: "AgNO3", b: "KI", targetColor: "rgba(255, 235, 59, 0.5)", state: "ppt", pptColor: "#fbc02d", gas: false, obs: "Dense, heavy Canary Yellow precipitate accumulates instantly.", eq: "KI + AgNO₃ → AgI↓ + KNO₃", notes: "Silver Halide verification sequence. Unlike AgCl, Silver Iodides (AgI) are completely insoluble within Ammonia solutions." }
        ];

        let selectedA = null, selectedB = null;
        let animationFrameId = null;

        // Initialize Rack Systems
        function initRack() {
            const containerA = document.getElementById('list-a');
            const containerB = document.getElementById('list-b');

            Object.keys(chemicalsA).forEach(key => {
                const div = document.createElement('div');
                div.className = 'chem-node';
                div.innerText = key;
                div.onclick = () => {
                    document.querySelectorAll('#list-a .chem-node').forEach(n => n.classList.remove('active-r1'));
                    div.classList.add('active-r1');
                    selectedA = key;
                    document.getElementById('lbl-a').innerText = key;
                    drawBeaker('canvasA', chemicalsA[key].color);
                    checkReadiness();
                };
                containerA.appendChild(div);
            });

            Object.keys(chemicalsB).forEach(key => {
                const div = document.createElement('div');
                div.className = 'chem-node';
                div.innerText = key;
                div.onclick = () => {
                    document.querySelectorAll('#list-b .chem-node').forEach(n => n.classList.remove('active-r2'));
                    div.classList.add('active-r2');
                    selectedB = key;
                    document.getElementById('lbl-b').innerText = key;
                    drawBeaker('canvasB', chemicalsB[key].color);
                    checkReadiness();
                };
                containerB.appendChild(div);
            });

            // Initial rendering of empty glassware
            drawBeaker('canvasA', 'transparent');
            drawBeaker('canvasB', 'transparent');
            drawBeaker('canvasMain', 'transparent', true);
        }

        function checkReadiness() {
            document.getElementById('pour-btn').disabled = !(selectedA && selectedB);
        }

        // Realistic Physics and Fluid Graphic Rendering Pipeline via Canvas
        function drawBeaker(canvasId, liquidColor, isMain = false, fillLevel = 0.4, pptColor = null, gasActive = false) {
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext('2d');
            const w = canvas.width;
            const h = canvas.height;

            ctx.clearRect(0, 0, w, h);

            // 1. Draw Liquid Phase with volumetric realistic gradient mapping
            if (liquidColor !== 'transparent' && fillLevel > 0) {
                ctx.save();
                ctx.beginPath();
                ctx.moveTo(15, h - 15);
                ctx.lineTo(w - 15, h - 15);
                ctx.lineTo(w - 15, h - (h * fillLevel));
                ctx.lineTo(15, h - (h * fillLevel));
                ctx.closePath();
                ctx.clip();

                // Advanced reflection shader simulation mapping
                let grad = ctx.createLinearGradient(0, 0, w, 0);
                grad.addColorStop(0, liquidColor);
                grad.addColorStop(0.3, 'rgba(255,255,255,0.15)');
                grad.addColorStop(0.7, liquidColor);
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, w, h);

                // If precipitate exists, layer it accurately at the bottom floor
                if (pptColor) {
                    let pptGrad = ctx.createLinearGradient(0, h-40, 0, h);
                    pptGrad.addColorStop(0, 'transparent');
                    pptGrad.addColorStop(0.4, pptColor);
                    ctx.fillStyle = pptGrad;
                    ctx.fillRect(15, h - 45, w - 30, 35);
                }
                ctx.restore();
            }

            // 2. Draw Glassware Framing (Realistic transparency reflection)
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.lineWidth = 4;
            ctx.lineJoin = 'round';
            ctx.beginPath();
            ctx.moveTo(10, 15);
            ctx.lineTo(15, 15);
            ctx.lineTo(15, h - 15);
            ctx.lineTo(w - 15, h - 15);
            ctx.lineTo(w - 15, 15);
            ctx.lineTo(w - 10, 15);
            ctx.stroke();

            // Lip lines
            ctx.lineWidth = 2;
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            for (let i = 40; i < h - 20; i += 25) {
                ctx.beginPath(); ctx.moveTo(w - 25, i); ctx.lineTo(w - 15, i); ctx.stroke();
            }
        }

        // Cinematic Physical Mixing Timeline Execution
        function executeSimulation() {
            const match = reactionEngine.find(r => r.a === selectedA && r.b === selectedB);
            const cA = document.getElementById('canvasA');
            const cB = document.getElementById('canvasB');

            // Stage 1: Animate Beaker A pouring left into Main
            cA.classList.add('pouring-left');
            
            setTimeout(() => {
                // Stage 2: Animate Beaker B pouring right into Main
                cB.classList.add('pouring-right');
                cA.classList.remove('pouring-left');
                drawBeaker('canvasA', 'transparent'); // emptied

                setTimeout(() => {
                    cB.classList.remove('pouring-right');
                    drawBeaker('canvasB', 'transparent'); // emptied
                    
                    // Stage 3: Synthesize chemical composition inside core engine
                    triggerSynthesis(match);
                }, 1000);

            }, 1000);
        }

        function triggerSynthesis(match) {
            let frame = 0;
            const maxFrames = 60;
            
            const startColor = chemicalsB[selectedB].color;
            const endColor = match ? match.targetColor : "rgba(200,210,225,0.4)";
            const pptColor = (match && match.state === 'ppt') ? match.pptColor : null;

            // Simple micro particle array tracking system for gas states
            let particles = [];
            if (match && match.gas) {
                for(let i=0; i<30; i++) {
                    particles.push({ x: Math.random()*110 + 25, y: Math.random()*80 + 100, r: Math.random()*3+2, vy: Math.random()*2+1 });
                }
            }

            function animateMix() {
                frame++;
                let progress = frame / maxFrames;
                
                // Linear interpolation of solution transformation
                let currentFill = 0.3 + (progress * 0.35); 
                
                // Render frame
                drawBeaker('canvasMain', endColor, true, currentFill, progress > 0.7 ? pptColor : null);

                // Run active overlay mechanics for Gas particle physics loops
                if (match && match.gas && frame < 120) {
                    const ctx = document.getElementById('canvasMain').getContext('2d');
                    ctx.fillStyle = "rgba(255,255,255,0.6)";
                    particles.forEach(p => {
                        p.y -= p.vy;
                        if(p.y < 50) p.y = 160; // reset loop
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
                        ctx.fill();
                    });
                }

                if (frame < maxFrames || (match && match.gas && frame < 100)) {
                    animationFrameId = requestAnimationFrame(animateMix);
                } else {
                    displayDataLogs(match);
                }
            }
            animateMix();
        }

        function displayDataLogs(match) {
            const panel = document.getElementById('diagnostics-panel');
            if (match) {
                panel.innerHTML = `
                    <h4 class="concept-title">Reaction Complete</h4>
                    <div class="data-card">
                        <strong>Visual Diagnostics:</strong><br>${match.obs}
                    </div>
                    <div class="data-card">
                        <strong>Chemical Formulation:</strong><br>
                        <div class="formula">${match.eq}</div>
                    </div>
                    <div class="data-card" style="border-left: 4px solid #f43f5e;">
                        <strong style="color:#f43f5e;">JEE/NEET Blueprint Context:</strong><br>
                        <p style="margin:5px 0 0 0; font-size:13px; line-height:1.4;">${match.notes}</p>
                    </div>
                `;
            } else {
                panel.innerHTML = `
                    <h4 class="concept-title" style="color:#64748b;">No Synthesis Path</h4>
                    <div class="data-card">
                        Mixing <strong>${selectedA}</strong> and <strong>${selectedB}</strong> produces no prominent ionic structural collision or visual state change inside standard NCERT analytical laboratory bounds.
                    </div>
                `;
            }
        }

        function resetStudio() {
            cancelAnimationFrame(animationFrameId);
            selectedA = null; selectedB = null;
            document.getElementById('lbl-a').innerText = "Beaker A";
            document.getElementById('lbl-b').innerText = "Beaker B";
            document.querySelectorAll('.chem-node').forEach(n => n.classList.remove('active-r1', 'active-r2'));
            drawBeaker('canvasA', 'transparent');
            drawBeaker('canvasB', 'transparent');
            drawBeaker('canvasMain', 'transparent', true);
            document.getElementById('pour-btn').disabled = true;
            document.getElementById('diagnostics-panel').innerHTML = `<div style="color: #64748b; text-align:center; margin-top:40px;">Select reactants from the left rack and trigger the synthesis to calculate properties.</div>`;
        }

        window.onload = initRack;
    </script>
</body>
</html>
